services:
  # Banco de Dados (Ambiente de Testes)
  mongodb:
    image: mongo:6
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=testezzeus2026x9y8z7
    ports:
      - "27018:27017"
    volumes:
      - mongodb_test_data:/data/db
    restart: always

  # Sistema de Cache (Ambiente de Testes)
  redis:
    image: redis:7
    ports:
      - "6381:6379"
    volumes:
      - redis_test_data:/data
    restart: always

  # API Open Source do WhatsApp (Ambiente de Testes)
  evolution-api:
    image: evoapicloud/evolution-api:v1.8.2
    depends_on:
      - mongodb
      - redis
    ports:
      - "8181:8080" 
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=testezzeus2026x9y8z7
      
      # Banco de Dados
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=mongodb
      - DATABASE_CONNECTION_URI=mongodb://root:testezzeus2026x9y8z7@mongodb:27017/?authSource=admin
      - DATABASE_CONNECTION_DB_PREFIX_NAME=tstx9z2p41
      
      # Cache
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=tstx9z2p41
    restart: always

  # Nosso Painel SaaS (Ambiente de Testes)
  saas-app:
    build: ./app
    ports:
      - "3001:3000"
    depends_on:
      - evolution-api
    restart: always

volumes:
  mongodb_data:
  redis_data: