version: '3.8'

services:
  # Banco de Dados Corrigido (MongoDB)
  mongodb:
    image: mongo:6
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=senha_segura_123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  # Sistema de Cache
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # API Open Source do WhatsApp (Evolution API)
  evolution-api:
    image: atendai/evolution-api:v1.8.2
    depends_on:
      - mongodb
      - redis
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      
      # Autenticação
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=SuaChaveSecretaMaster123
      
      # Banco de Dados
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=mongodb://root:senha_segura_123@mongodb:27017/?authSource=admin
      - DATABASE_CONNECTION_DB_PREFIX_NAME=evolution
      
      # Cache
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
    restart: always

  # Nosso Painel SaaS (Frontend e Backend)
  saas-app:
    build: ./app
    ports:
      - "3000:3000"
    depends_on:
      - evolution-api
    restart: always
    environment:
      # Limita a RAM que o Node.js pode usar (512MB) antes de limpar a memória. Evita o erro 137 (OOMKilled)
      - NODE_OPTIONS=--max-old-space-size=512
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Gerenciador de SSL e Proxy Reverso (Nginx Proxy Manager)
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    depends_on:
      - saas-app

volumes:
  mongodb_data:
  redis_data:
